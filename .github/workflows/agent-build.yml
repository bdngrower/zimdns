name: Build ZIM DNS Agent

on:
  push:
    branches: [ main ]
    paths:
      - 'zimdns-agent/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'zimdns-agent/**'
  workflow_dispatch:

jobs:
  build-agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: zimdns-agent/go.sum

      - name: Install dependencies
        run: |
          cd zimdns-agent
          go mod tidy

      - name: Build Agent executable
        run: |
          cd zimdns-agent
          go build -o bin/zimdns-agent-setup.exe ./cmd/agent

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zimdns-agent-windows
          path: zimdns-agent/bin/zimdns-agent-setup.exe
